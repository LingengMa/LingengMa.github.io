{{ define "main" }}
<div class='homepage-container'>
  <img src="/me.png" class='homepage-favicon'>
  <div class='homepage-title'> {{ .Site.Title }} </div>

  <div class='homepage-socials'>
    {{ range .Site.Params.socials }}
    <a class='homepage-social-item' href="{{ .link }}">
      {{- if .svg -}}
      <img src="{{ .svg }}" alt="{{ .label }}" class="social-svg-icon">
      {{- else -}}
      {{- .emoji -}}
      {{- end -}}
    </a>
    {{ end }}
  </div>

  {{ partial "heatmap" . }}
</div>
{{ end }}
