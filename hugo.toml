baseURL = 'https://LingengMa.github.io/'
languageCode = 'zh-cn'
title = "LingengMa's blog"
theme = 'inkwell'

[markup]
  [markup.highlight]
    noClasses = false

[params]
  sitename = "LingengMa's blog"
  description = "LingengMa 的个人博客，记录技术学习与生活随笔"
  [params.author]
    name = "LingengMa"
    email = "your@email.com"
  contact = "<p>Hi，我是 LingengMa。欢迎访问我的博客！</p>"

  # 导航栏分区
  [[params.sections]]
    zh_name = "首页"
    link = "/"
  [[params.sections]]
    zh_name = "博客"
    link = "/posts/"
  [[params.sections]]
    zh_name = "关于"
    link = "/about/"
  [[params.sections]]
    zh_name = "日志"
    link = "/changelog/"

  # 首页社交链接（svg 字段填写 /svg/ 目录下的图标路径）
  [[params.socials]]
    svg   = "/svg/email.svg"
    label = "Email"
    link  = "mailto:LingengMa@qq.com"
  [[params.socials]]
    svg   = "/svg/github.svg"
    label = "GitHub"
    link  = "https://github.com/LingengMa"
  [[params.socials]]
    svg   = "/svg/rss.svg"
    label = "RSS"
    link  = "/index.xml"
